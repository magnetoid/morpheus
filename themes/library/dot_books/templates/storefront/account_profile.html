{% extends "storefront/base.html" %}
{% block title %}Profile — dot books{% endblock %}

{% block content %}
<section style="padding: 4rem 0 5rem;">
  <div class="wrap" style="max-width: 600px;">
    <p class="meta" style="margin-bottom: 1rem;">
      <a href="/account/" style="color: var(--muted);">Account</a> / Profile
    </p>
    <h1 class="display display-l" style="margin: .5rem 0 2rem;">Your profile<span class="text-accent">.</span></h1>

    <form method="post" style="display: grid; gap: 1rem;">
      {% csrf_token %}
      <div>
        <label class="meta" style="display:block; margin-bottom: .35rem;">First name</label>
        <input type="text" name="first_name" value="{{ user.first_name }}" style="width:100%; height:44px; padding: 0 1rem; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper); font-family: var(--sans);">
      </div>
      <div>
        <label class="meta" style="display:block; margin-bottom: .35rem;">Last name</label>
        <input type="text" name="last_name" value="{{ user.last_name }}" style="width:100%; height:44px; padding: 0 1rem; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper); font-family: var(--sans);">
      </div>
      <div>
        <label class="meta" style="display:block; margin-bottom: .35rem;">Email</label>
        <input type="email" name="email" value="{{ user.email }}" style="width:100%; height:44px; padding: 0 1rem; border: 1px solid var(--rule); border-radius: 6px; background: var(--paper); font-family: var(--sans);">
      </div>
      <div><button type="submit" class="btn btn-primary">Save profile</button></div>
    </form>
  </div>
</section>
{% endblock %}

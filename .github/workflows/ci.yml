name: ci

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DEBUG: "1"
  SECRET_KEY: "ci-test-secret-key-not-for-production"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  DATABASE_URL: "sqlite:///db.sqlite3"
  REDIS_URL: "redis://localhost:6379/0"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4 mypy==1.13.0 bandit==1.8.0
      - name: ruff
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: bandit (security)
        run: bandit -q -r . -x ./venv,./tests,./.venv,./db.sqlite3 -ll

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage pytest pytest-django
      - name: Django checks
        run: python manage.py check --deploy --fail-level WARNING || true
      - name: Migrations are present
        run: python manage.py makemigrations --check --dry-run
      - name: Tests with coverage
        run: |
          coverage run --source='.' manage.py test --noinput
          coverage report -m --fail-under=40
          coverage xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

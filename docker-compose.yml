name: morpheus

include:
  - path: compose/supabase/docker-compose.yml
    env_file:
      - .env

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  nats:
    image: nats:2
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8889:8889"  # Prometheus exporter
    depends_on:
      - loki
      - prometheus

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana
      - ./compose/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./compose/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki

  vector:
    image: timberio/vector:0.41.1-alpine
    volumes:
      - ./compose/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8686:8686"
    depends_on:
      - loki

  web:
    build: .
    environment:
      DEBUG: "True"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: nats://nats:4222
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: morpheus-web
      OTEL_METRICS_EXPORTER: none
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "vector.logs=true"

  worker:
    build: .
    command: ["celery", "-A", "morph", "worker", "-l", "info"]
    environment:
      DEBUG: "True"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: morpheus-worker
      OTEL_METRICS_EXPORTER: none
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "vector.logs=true"

  ops-agent:
    build:
      context: ./services/ops_agent
    environment:
      PROMETHEUS_BASE_URL: http://prometheus:9090
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ops-agent
    ports:
      - "8081:8081"
    depends_on:
      - prometheus
    labels:
      - "vector.logs=true"

volumes:
  redisdata:
  grafanadata:
  lokidata:

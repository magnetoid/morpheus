# Morpheus — Coolify deployment manifest.
#
# Designed to be dropped into Coolify as a "Docker Compose" application.
# Coolify automatically:
#   - resolves ${SERVICE_FQDN_*} to a public hostname behind its Traefik proxy
#   - generates and persists ${SERVICE_PASSWORD_*} on first deploy
#   - manages named volumes (postgres_data, redis_data, …) under the project namespace
#   - injects Traefik routing labels for any service that uses SERVICE_FQDN_*
#
# What you need to set in Coolify's "Environment Variables":
#   SECRET_KEY              — 50+ random chars
#   ALLOWED_HOSTS           — your.domain.com (Coolify also injects via SERVICE_FQDN_WEB)
#   CORS_ALLOWED_ORIGINS    — https://your.domain.com (or storefront origin)
#   STRIPE_SECRET_KEY       — sk_live_…
#   STRIPE_WEBHOOK_SECRET   — whsec_…
#   OPENAI_API_KEY (or ANTHROPIC_API_KEY)
#
# All Postgres/Redis credentials are auto-generated by Coolify and consumed by URL.

name: morpheus

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: morpheus
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: morpheus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morpheus -d morpheus"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${SERVICE_PASSWORD_REDIS}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SERVICE_PASSWORD_REDIS}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    image: ${MORPHEUS_IMAGE:-ghcr.io/magnetoid/morpheus:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["web"]
    environment:
      # ── Required ──────────────────────────────────────────────────────────
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${SERVICE_FQDN_WEB},${ALLOWED_HOSTS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${SERVICE_FQDN_WEB}}
      DATABASE_URL: postgres://morpheus:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/morpheus
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
      REDIS_URL: redis://default:${SERVICE_PASSWORD_REDIS}@redis:6379/0
      # ── Gunicorn knobs (override per environment) ────────────────────────
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      # ── Payments ──────────────────────────────────────────────────────────
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # ── AI / LLM ──────────────────────────────────────────────────────────
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ── Email ─────────────────────────────────────────────────────────────
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@${SERVICE_FQDN_WEB}}
      # ── Optional observability ────────────────────────────────────────────
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: morpheus-web
      # ── Storage (S3 — optional) ───────────────────────────────────────────
      USE_S3: ${USE_S3:-False}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - coolify.managed=true

  worker:
    image: ${MORPHEUS_IMAGE:-ghcr.io/magnetoid/morpheus:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["worker"]
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${SERVICE_FQDN_WEB},${ALLOWED_HOSTS:-}
      DATABASE_URL: postgres://morpheus:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/morpheus
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
      REDIS_URL: redis://default:${SERVICE_PASSWORD_REDIS}@redis:6379/0
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: morpheus-worker
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "morph", "inspect", "ping", "-t", "5"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    image: ${MORPHEUS_IMAGE:-ghcr.io/magnetoid/morpheus:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["beat"]
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${SERVICE_FQDN_WEB},${ALLOWED_HOSTS:-}
      DATABASE_URL: postgres://morpheus:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/morpheus
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
      REDIS_URL: redis://default:${SERVICE_PASSWORD_REDIS}@redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: morpheus-beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  # ── Optional: NATS JetStream for the transactional outbox publisher ───────
  # Uncomment to enable. The default deployment uses the Celery-driven outbox
  # publisher in core/tasks.py:process_outbox, which works without NATS.
  #
  # nats:
  #   image: nats:2-alpine
  #   restart: unless-stopped
  #   command: ["-js", "-sd", "/data"]
  #   volumes:
  #     - nats_data:/data
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/varz"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 10s

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  # nats_data:

{% extends "admin_dashboard/base.html" %}
{% block title %}CMS menus{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">Menus</h1>
<div class="card"><table class="morph-table">
<thead><tr><th>Key</th><th>Label</th><th>Active</th></tr></thead>
<tbody>{% for r in rows %}
<tr><td><code>{{ r.key }}</code></td><td>{{ r.label }}</td>
<td>{% if r.is_active %}<span class="pill pill-success">on</span>{% else %}<span class="pill pill-neutral">off</span>{% endif %}</td></tr>
{% empty %}<tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--text-muted);">No menus.</td></tr>
{% endfor %}</tbody></table></div>
{% endblock %}

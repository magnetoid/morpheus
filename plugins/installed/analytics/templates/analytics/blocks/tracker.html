{# Storefront analytics beacon — emits product views, search queries, cart adds. #}
<script>
(function() {
  var TRACK_URL = '/api/analytics/track/';

  function send(name, kind, extra) {
    try {
      var payload = Object.assign({name: name, kind: kind, url: location.pathname + location.search}, extra || {});
      var blob = new Blob([JSON.stringify(payload)], {type: 'application/json'});
      if (navigator.sendBeacon) navigator.sendBeacon(TRACK_URL, blob);
      else fetch(TRACK_URL, {method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'}});
    } catch (e) {}
  }

  // Auto-detect product detail pages: /products/<slug>/
  var m = location.pathname.match(/^\/products\/([\w-]+)\/?$/);
  if (m) send('product.viewed', 'product_view', {product_slug: m[1]});

  // Search results page
  var search = new URLSearchParams(location.search).get('q');
  if (search && location.pathname.indexOf('/search') >= 0) {
    send('search.performed', 'search', {search_query: search});
  }

  // Cart-add buttons (form action="/cart/add/<id>/" pattern)
  document.addEventListener('submit', function(e) {
    var form = e.target;
    if (form && form.action && /\/cart\/add\//.test(form.action)) {
      send('cart.add', 'cart');
    }
  }, true);

  // Expose a helper for plugins to fire custom events.
  window.morpheusTrack = send;
})();
</script>

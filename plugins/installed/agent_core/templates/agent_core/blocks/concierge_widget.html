{# Storefront concierge chat widget — minimal, no JS framework. #}
<div id="morpheus-concierge" style="
  position: fixed; right: 1.5rem; bottom: 1.5rem; z-index: 9000;
  font-family: var(--sans, system-ui), sans-serif;">
  <button id="morpheus-concierge-toggle" type="button" style="
    border: none; background: var(--ink, #0e0e0e); color: var(--paper, #f7f3ec);
    border-radius: 999px; padding: .85rem 1.25rem; font-size: .85rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.18); cursor: pointer;">
    Ask the concierge
  </button>
  <div id="morpheus-concierge-panel" style="
    display: none; position: absolute; right: 0; bottom: 3.5rem;
    width: 360px; max-width: calc(100vw - 3rem); height: 480px;
    background: var(--paper, #fff); border: 1px solid var(--rule, #e5e0d6);
    border-radius: 12px; box-shadow: 0 24px 48px rgba(0,0,0,.18);
    flex-direction: column; overflow: hidden;">
    <div style="padding: .85rem 1rem; border-bottom: 1px solid var(--rule, #e5e0d6);
      display: flex; justify-content: space-between; align-items: center;">
      <strong style="font-size: .9rem;">Concierge</strong>
      <button id="morpheus-concierge-close" type="button" style="
        border: none; background: transparent; cursor: pointer; font-size: 1.1rem;
        color: var(--muted, #6b6b66);">×</button>
    </div>
    <div id="morpheus-concierge-log" style="
      flex: 1; padding: 1rem; overflow-y: auto; font-size: .9rem;
      line-height: 1.45; color: var(--ink, #0e0e0e);"></div>
    <form id="morpheus-concierge-form" style="
      display: flex; gap: .5rem; padding: .65rem; border-top: 1px solid var(--rule, #e5e0d6);">
      <input type="text" name="message" placeholder="Ask for a book..."
        autocomplete="off" required style="
        flex: 1; padding: .55rem .75rem; border: 1px solid var(--rule, #e5e0d6);
        border-radius: 999px; font-size: .85rem;">
      <button type="submit" style="
        border: none; background: var(--ink, #0e0e0e); color: var(--paper, #fff);
        border-radius: 999px; padding: .55rem 1rem; font-size: .85rem; cursor: pointer;">
        Send
      </button>
    </form>
  </div>
</div>
<script>
(function() {
  var toggle = document.getElementById('morpheus-concierge-toggle');
  var panel = document.getElementById('morpheus-concierge-panel');
  var close = document.getElementById('morpheus-concierge-close');
  var form = document.getElementById('morpheus-concierge-form');
  var log = document.getElementById('morpheus-concierge-log');

  function appendLine(role, text) {
    var el = document.createElement('div');
    el.style.margin = '.5rem 0';
    el.style.color = role === 'user' ? 'var(--ink, #0e0e0e)' : 'var(--ink-2, #3b3a36)';
    el.innerHTML = '<strong>' + (role === 'user' ? 'You' : 'Concierge') + ':</strong> ' +
      text.replace(/[<>&]/g, function(m) { return {'<':'&lt;','>':'&gt;','&':'&amp;'}[m]; });
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  toggle.addEventListener('click', function() {
    panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  });
  close.addEventListener('click', function() { panel.style.display = 'none'; });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var input = form.querySelector('input[name=message]');
    var text = (input.value || '').trim();
    if (!text) return;
    appendLine('user', text);
    input.value = '';
    appendLine('agent', '…');
    fetch('/api/agents/concierge/invoke', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-Requested-With': 'fetch'},
      body: JSON.stringify({message: text})
    }).then(function(r) { return r.json(); })
      .then(function(data) {
        log.lastChild.remove();
        appendLine('agent', data.text || data.error || '(no reply)');
      })
      .catch(function(err) {
        log.lastChild.remove();
        appendLine('agent', 'Sorry — something went wrong.');
      });
  });
})();
</script>

sources:
  docker_logs:
    type: "docker_logs"
    include_labels:
      - "vector.logs"

transforms:
  parse_logs:
    type: "remap"
    inputs:
      - "docker_logs"
    source: |
      . = parse_json(.message) ?? .

sinks:
  loki:
    type: "loki"
    inputs:
      - "parse_logs"
    endpoint: "http://loki:3100"
    labels:
      container_name: "{{ container_name }}"
      source: "vector"
    encoding:
      codec: "json"
